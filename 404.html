<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Route Not Found</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <!-- CSS -->
    <style>
        :root {
            --bg-color: #0d1117;
            --surface-color: #161b22;
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
            --accent-color: #58a6ff;
            --border-color: #30363d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: 2rem;
        }

        h1 {
            font-size: 8rem;
            color: var(--accent-color);
            margin-bottom: 0;
            line-height: 1;
            text-shadow: 0 0 20px rgba(88, 166, 255, 0.2);
        }

        h2 {
            font-size: 2rem;
            color: #ffffff;
            margin-bottom: 1rem;
        }

        p {
            color: var(--text-secondary);
            font-size: 1.2rem;
            max-width: 600px;
            margin-bottom: 2rem;
        }

        .btn {
            display: inline-block;
            background-color: transparent;
            color: var(--accent-color);
            text-decoration: none;
            border: 1px solid var(--accent-color);
            padding: 0.8rem 1.5rem;
            border-radius: 6px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background-color: rgba(88, 166, 255, 0.1);
            transform: translateY(-2px);
        }
    </style>
</head>

<body>
    <h1>404</h1>
    <br>
    <p>It looks like there was a issue loading the page. Sorry about that!</p>
    <br>
    <a href="https://demuth-j.github.io/demuthj-personal-site/" class="btn">&larr; Return to Main Page</a>
</body>
</html>
